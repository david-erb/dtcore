name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ghcr.io/david-erb/docker30-linux1:latest
    strategy:
      matrix:
        app: [test_all, demo_hello, demo_basics]
    steps:
      - uses: actions/checkout@v5
      - name: Run
        run: bash scripts/ci_linux.sh ${{ matrix.app }}

  espidf:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: ghcr.io/david-erb/docker30-espidf1:latest
    strategy:
      matrix:
        app: [test_all, demo_hello, demo_basics]
    steps:
      - uses: actions/checkout@v5
      - name: Run
        run: bash scripts/ci_espidf.sh ${{ matrix.app }}

  zephyr:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: ghcr.io/david-erb/docker30-nrf2:latest
    strategy:
      matrix:
        app: [test_all, demo_hello, demo_basics]
    steps:
      - uses: actions/checkout@v5
      - name: Run
        run: bash scripts/ci_zephyr.sh ${{ matrix.app }}
